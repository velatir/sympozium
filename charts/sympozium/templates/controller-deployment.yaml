apiVersion: apps/v1
kind: Deployment
metadata:
  name: sympozium-controller-manager
  namespace: {{ include "sympozium.namespace" . }}
  labels:
    {{- include "sympozium.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
    control-plane: controller-manager
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      control-plane: controller-manager
  template:
    metadata:
      labels:
        control-plane: controller-manager
      annotations:
        kubectl.kubernetes.io/default-container: manager
    spec:
      serviceAccountName: sympozium-controller-manager
      terminationGracePeriodSeconds: 10
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: manager
          image: {{ include "sympozium.controllerImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            {{- if .Values.controller.leaderElect }}
            - --leader-elect
            {{- end }}
          env:
            - name: NATS_URL
              value: {{ include "sympozium.natsUrl" . }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # Image registry/tag used by the controller when spawning
            # runtime pods (agent-runner, ipc-bridge, channel-*, skill sidecars,
            # mcp-bridge, llmfit probe, web-proxy, memory server, …).
            # Allows fully self-hosting all Sympozium-built images.
            - name: SYMPOZIUM_IMAGE_REGISTRY
              value: {{ .Values.image.registry | quote }}
            {{- $imgTag := .Values.image.tag | default .Chart.AppVersion }}
            {{- if $imgTag }}
            - name: SYMPOZIUM_IMAGE_TAG
              value: {{ $imgTag | quote }}
            {{- end }}
            {{- if .Values.delegation.controllerExecutor }}
            # Opt-in fallback: spawn delegation-edge targets controller-side for
            # models that never emit the delegate_to_persona tool. Default off;
            # the tool-driven delegation path is unchanged when unset.
            - name: SYMPOZIUM_DELEGATION_CONTROLLER_EXECUTOR
              value: "true"
            {{- end }}
            {{- if .Values.observability.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.endpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: {{ .Values.observability.protocol | quote }}
            - name: OTEL_SERVICE_NAME
              value: "{{ .Values.observability.serviceNamePrefix }}-controller"
            - name: OTEL_TRACES_SAMPLER
              value: "parentbased_traceidratio"
            - name: OTEL_TRACES_SAMPLER_ARG
              value: {{ .Values.observability.samplingRatio | quote }}
            - name: SYMPOZIUM_OTEL_BATCH_TIMEOUT
              value: {{ .Values.observability.controller.batchTimeout | quote }}
            {{- if .Values.observability.headers }}
            - name: OTEL_EXPORTER_OTLP_HEADERS
              value: {{ include "sympozium.otelHeaders" . | quote }}
            {{- end }}
            {{- if .Values.observability.resourceAttributes }}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: {{ include "sympozium.otelResourceAttrs" . | quote }}
            {{- end }}
            # Default observability config for Ensemble-created instances.
            - name: SYMPOZIUM_DEFAULT_OTEL_ENABLED
              value: {{ .Values.observability.defaultInstance.enabled | quote }}
            - name: SYMPOZIUM_DEFAULT_OTEL_ENDPOINT
              value: {{ .Values.observability.defaultInstance.otlpEndpoint | quote }}
            - name: SYMPOZIUM_DEFAULT_OTEL_PROTOCOL
              value: {{ .Values.observability.defaultInstance.otlpProtocol | quote }}
            - name: SYMPOZIUM_DEFAULT_OTEL_SERVICE_NAME
              value: {{ .Values.observability.defaultInstance.serviceName | quote }}
            {{- end }}
            {{- if .Values.agentSandbox.enabled }}
            - name: AGENT_SANDBOX_ENABLED
              value: "true"
            - name: AGENT_SANDBOX_DEFAULT_RUNTIME_CLASS
              value: {{ .Values.agentSandbox.defaultRuntimeClass | quote }}
            {{- end }}
          ports:
            - containerPort: 8081
              name: health
              protocol: TCP
            - containerPort: 8080
              name: metrics
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
