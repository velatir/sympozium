{{- if .Values.rbac.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sympozium-controller-manager
  namespace: {{ include "sympozium.namespace" . }}
  labels:
    {{- include "sympozium.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sympozium-apiserver
  namespace: {{ include "sympozium.namespace" . }}
  labels:
    {{- include "sympozium.labels" . | nindent 4 }}
    app.kubernetes.io/component: apiserver
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "sympozium.fullname" . }}-manager
  labels:
    {{- include "sympozium.labels" . | nindent 4 }}
rules:
  # CRDs
  - apiGroups: ["sympozium.ai"]
    resources:
      - agents
      - agentruns
      - sympoziumpolicies
      - skillpacks
      - sympoziumschedules
      - ensembles
      - sympoziumconfigs
      - mcpservers
      - models
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["sympozium.ai"]
    resources:
      - agents/status
      - agentruns/status
      - sympoziumpolicies/status
      - skillpacks/status
      - sympoziumschedules/status
      - ensembles/status
      - sympoziumconfigs/status
      - mcpservers/status
      - models/status
    verbs: ["get", "update", "patch"]
  - apiGroups: ["sympozium.ai"]
    resources:
      - agents/finalizers
      - agentruns/finalizers
      - sympoziumpolicies/finalizers
      - skillpacks/finalizers
      - sympoziumschedules/finalizers
      - ensembles/finalizers
      - sympoziumconfigs/finalizers
      - mcpservers/finalizers
      - models/finalizers
    verbs: ["update"]
  # Claim-based model placement: the controller expresses model requirements
  # as llmfit.ai ModelClaims (docs/positioning.md — models are claimed, not
  # placed). Status is read from the same resource.
  - apiGroups: ["llmfit.ai"]
    resources:
      - modelclaims
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Core resources — controller + skill RBAC delegation
  - apiGroups: [""]
    resources:
      - configmaps
      - endpoints
      - events
      - limitranges
      - persistentvolumeclaims
      - pods
      - pods/exec
      - pods/log
      - pods/portforward
      - replicationcontrollers
      - resourcequotas
      - secrets
      - serviceaccounts
      - services
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Read-only cluster-scoped core resources
  - apiGroups: [""]
    resources: ["namespaces", "nodes", "persistentvolumes"]
    verbs: ["get", "list", "watch"]
  # RBAC for skill sidecar auto-provisioning
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles", "clusterrolebindings", "roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Jobs + CronJobs for agent runs
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Apps resources — deployments, statefulsets, daemonsets, replicasets, controllerrevisions
  - apiGroups: ["apps"]
    resources: ["controllerrevisions", "daemonsets", "deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Autoscaling
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Networking
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingressclasses", "ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Policy
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Storage (read-only)
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses", "volumeattachments"]
    verbs: ["get", "list", "watch"]
  # CRD management (install/uninstall Agent Sandbox CRDs from the UI)
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  # Metrics API — needed to grant metrics.k8s.io permissions to skill sidecars (e.g. kubectl top)
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
  # Gateway API — Gateways, GatewayClasses, and HTTPRoutes
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gatewayclasses", "gateways", "httproutes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  {{- if and .Values.agentSandbox.enabled .Values.agentSandbox.rbac }}
  # Agent Sandbox CRDs (kubernetes-sigs/agent-sandbox)
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["sandboxes", "sandboxclaims", "sandboxwarmpools"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["sandboxes/status", "sandboxclaims/status", "sandboxwarmpools/status"]
    verbs: ["get"]
  {{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sympozium-web-proxy
  namespace: {{ include "sympozium.namespace" . }}
  labels:
    {{- include "sympozium.labels" . | nindent 4 }}
    app.kubernetes.io/component: web-proxy
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "sympozium.fullname" . }}-web-proxy
  labels:
    {{- include "sympozium.labels" . | nindent 4 }}
rules:
  - apiGroups: ["sympozium.ai"]
    resources: ["agentruns"]
    verbs: ["create", "get", "list", "watch"]
  - apiGroups: ["sympozium.ai"]
    resources: ["agents"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "sympozium.fullname" . }}-web-proxy
  labels:
    {{- include "sympozium.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "sympozium.fullname" . }}-web-proxy
subjects:
  - kind: ServiceAccount
    name: sympozium-web-proxy
    namespace: {{ include "sympozium.namespace" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "sympozium.fullname" . }}-apiserver
  labels:
    {{- include "sympozium.labels" . | nindent 4 }}
rules:
  # Sympozium CRDs — CRUD for REST API / web UI operations
  - apiGroups: ["sympozium.ai"]
    resources:
      - agents
      - agentruns
      - sympoziumpolicies
      - skillpacks
      - sympoziumschedules
      - ensembles
      - sympoziumconfigs
      - mcpservers
      - models
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Status read/update
  - apiGroups: ["sympozium.ai"]
    resources:
      - agents/status
      - agentruns/status
      - sympoziumpolicies/status
      - ensembles/status
      - models/status
    verbs: ["get", "update", "patch"]
  # Finalizers (needed for delete cascades)
  - apiGroups: ["sympozium.ai"]
    resources:
      - agents/finalizers
      - agentruns/finalizers
      - ensembles/finalizers
      - models/finalizers
    verbs: ["update"]
  # Read pods/logs for streaming run output
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  # Read nodes for topology view, provider discovery, and cluster status
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  # Secrets — full access (auth token setup, ensemble credential lifecycle)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # ConfigMaps, services, namespaces, service accounts
  - apiGroups: [""]
    resources: ["configmaps", "services", "namespaces", "serviceaccounts"]
    verbs: ["get", "list", "watch", "create"]
  # Gateway API (apiserver manages gateway config)
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gatewayclasses", "gateways", "httproutes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # DRA inventory (read-only): llmfit-dra ResourceSlices decorate the
  # topology with per-node accelerators and fabric NICs. Absence of the
  # API group degrades gracefully (endpoint reports unavailable).
  - apiGroups: ["resource.k8s.io"]
    resources: ["resourceslices"]
    verbs: ["get", "list", "watch"]
  {{- if and .Values.agentSandbox.enabled .Values.agentSandbox.rbac }}
  # Agent Sandbox CRD management (install/uninstall from UI)
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "sympozium.fullname" . }}-manager
  labels:
    {{- include "sympozium.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "sympozium.fullname" . }}-manager
subjects:
  - kind: ServiceAccount
    name: sympozium-controller-manager
    namespace: {{ include "sympozium.namespace" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "sympozium.fullname" . }}-apiserver
  labels:
    {{- include "sympozium.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "sympozium.fullname" . }}-apiserver
subjects:
  - kind: ServiceAccount
    name: sympozium-apiserver
    namespace: {{ include "sympozium.namespace" . }}
---
# Canary health-check RBAC — allows the system canary agent to list
# cluster resources for deterministic health checks.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "sympozium.fullname" . }}-canary
  labels:
    {{- include "sympozium.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["sympozium.ai"]
    resources: ["sympoziumschedules", "mcpservers"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "sympozium.fullname" . }}-canary
  labels:
    {{- include "sympozium.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "sympozium.fullname" . }}-canary
subjects:
  - kind: ServiceAccount
    name: sympozium-agent
    namespace: {{ include "sympozium.namespace" . }}
{{- end }}
