name: Build and Push Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io/velatir/sympozium

permissions:
  contents: read
  packages: write

# A newer push supersedes an in-flight run of the same ref. The fleet is
# tagged by sha + latest, so the superseding run rewrites every tag the
# cancelled one would have written — back-to-back pushes stop paying for
# the whole 18-image fleet twice.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Gate the expensive fleet build on whether anything that reaches an
  # image actually changed. Verification is one cheap job and always runs.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**.go'
              - 'go.mod'
              - 'go.sum'
              - 'images/**'
              - 'web/**'
              - '.github/workflows/build.yaml'

  # fmt, vet, build, test, and codegen used to be five runners each paying
  # its own checkout + setup-go + module download. The steps are strictly
  # cheaper back-to-back on one warm cache; they stay separate steps so a
  # failure still names itself.
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l $(find . -name '*.go' -not -path './vendor/*'))
          if [ -n "$unformatted" ]; then
            echo "::error::The following files are not formatted:"
            echo "$unformatted"
            echo ""
            echo "Run 'gofmt -s -w .' to fix."
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -short ./...

      - name: Check generated code is up to date
        run: |
          make generate
          if ! git diff --quiet; then
            echo "::error::Generated code is out of date. Run 'make generate' and commit the changes."
            git diff --stat
            exit 1
          fi

      - name: Check Helm chart CRDs in sync
        run: make helm-sync-check

  build-and-push:
    runs-on: ubuntu-latest
    needs: [changes, verify]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        image:
          - agent-runner
          - controller
          - apiserver
          - ipc-bridge
          - webhook
          - web-proxy
          - channel-telegram
          - channel-whatsapp
          - channel-discord
          - channel-slack
          - skill-k8s-ops
          - skill-sre-observability
          - skill-github-gitops
          - skill-llmfit
          - skill-memory
          - mcp-bridge
          - node-probe
          - llmfit-daemon
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/${{ matrix.image }}/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Scoped per image: 18 matrix jobs writing mode=max into ONE
          # shared scope evicted each other constantly — every build ran
          # effectively cold.
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
