name: Build and Push Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io/velatir/sympozium

permissions:
  contents: read
  packages: write

# A newer push supersedes an in-flight run of the same ref. The fleet is
# tagged by sha + latest, so the superseding run rewrites every tag the
# cancelled one would have written — back-to-back pushes stop paying for
# the whole 18-image fleet twice.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Gate the expensive fleet build on whether anything that reaches an
  # image actually changed. Verification is one cheap job and always runs.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**.go'
              - 'go.mod'
              - 'go.sum'
              - 'images/**'
              - 'web/**'
              - '.github/workflows/build.yaml'

  # fmt, vet, build, test, and codegen used to be five runners each paying
  # its own checkout + setup-go + module download. The steps are strictly
  # cheaper back-to-back on one warm cache; they stay separate steps so a
  # failure still names itself.
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l $(find . -name '*.go' -not -path './vendor/*'))
          if [ -n "$unformatted" ]; then
            echo "::error::The following files are not formatted:"
            echo "$unformatted"
            echo ""
            echo "Run 'gofmt -s -w .' to fix."
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -short ./...

      - name: Check generated code is up to date
        run: |
          make generate
          if ! git diff --quiet; then
            echo "::error::Generated code is out of date. Run 'make generate' and commit the changes."
            git diff --stat
            exit 1
          fi

      - name: Check Helm chart CRDs in sync
        run: make helm-sync-check

  build-and-push:
    runs-on: ubuntu-latest
    needs: [changes, verify]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        image:
          - agent-runner
          - controller
          - apiserver
          - ipc-bridge
          - webhook
          - web-proxy
          - channel-telegram
          - channel-whatsapp
          - channel-discord
          - channel-slack
          - skill-k8s-ops
          - skill-sre-observability
          - skill-github-gitops
          - skill-llmfit
          - skill-memory
          - mcp-bridge
          - node-probe
          - llmfit-daemon
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/${{ matrix.image }}/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Scoped per image: 18 matrix jobs writing mode=max into ONE
          # shared scope evicted each other constantly — every build ran
          # effectively cold.
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  # ── Publish Helm chart to GHCR OCI on every main push ─────────────────────────
  # For quick debugging iterations on the Velatir fork: every push to main
  # packages the chart with version "<chart_version>-<short_sha>" and pushes
  # to GHCR OCI, then dispatches to velatir-infrastructure so agents-dev
  # pins to it automatically. agents-prod is unaffected — production stays
  # pinned to the latest release tag, bumped via the existing
  # velatir-sympozium-charts-published dispatch from release.yaml.
  #
  # Runs on EVERY push to main (and on workflow_dispatch). It does NOT gate
  # on the `changes` filter — code-only pushes still need the chart republished
  # so Chart.AppVersion carries the new image SHA, otherwise Flux stays
  # pinned to the old chart and the new image is built but never consumed.
  publish-chart-oci:
    name: Publish chart to GHCR OCI (main)
    needs: [verify]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Compute chart version
        id: version
        run: |
          set -euo pipefail
          CHART_VERSION=$(grep '^version:' charts/sympozium/Chart.yaml | awk '{print $2}')
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="${CHART_VERSION}-${SHORT_SHA}"
          echo "chart_version=${CHART_VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}"         >> "$GITHUB_OUTPUT"
          echo "Pinning chart version: ${VERSION} (appVersion: ${SHORT_SHA})"

      - name: Package charts
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          # Bundled llmfit-dra dependency (Chart.lock) — resolve before packaging.
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          helm dependency build charts/sympozium
          # Override the chart version so each main push produces a unique
          # OCI tag (Flux needs a stable, monotonically-rising version).
          # appVersion carries the short SHA so `kubectl describe helmrelease`
          # shows which commit the cluster is running.
          helm package charts/sympozium-crds \
            --version "${VERSION}" --app-version "${SHORT_SHA}" \
            --destination .helm-packages
          helm package charts/sympozium \
            --version "${VERSION}" --app-version "${SHORT_SHA}" \
            --destination .helm-packages

      - name: Push charts to GHCR OCI
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          helm push .helm-packages/sympozium-crds-${VERSION}.tgz oci://ghcr.io/velatir
          helm push .helm-packages/sympozium-${VERSION}.tgz      oci://ghcr.io/velatir

      - name: Notify velatir-infrastructure (dev only)
        if: success()
        env:
          GH_TOKEN: ${{ secrets.VELATIR_INFRA_DISPATCH_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh api repos/velatir/velatir-infrastructure/dispatches \
            -f event_type=velatir-sympozium-charts-main-pushed \
            -f client_payload[version]="${VERSION}" \
            -f client_payload[registry]=oci://ghcr.io/velatir \
            -f client_payload[target]=dev
