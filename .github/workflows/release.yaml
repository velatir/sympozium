name: Release CLI

on:
  push:
    tags: ["v*"]
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

permissions:
  contents: write
  packages: write
  actions: write

env:
  REGISTRY: ghcr.io/sympozium-ai/sympozium
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  release-cli:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build CLI
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${RELEASE_TAG}"
          go build -ldflags="-s -w -X main.version=${VERSION}" \
            -o sympozium ./cmd/sympozium

      - name: Package
        run: |
          PLATFORM="${{ matrix.goos }}-${{ matrix.goarch }}"
          tar -czf "sympozium-${PLATFORM}.tar.gz" sympozium
          sha256sum "sympozium-${PLATFORM}.tar.gz" > "sympozium-${PLATFORM}.tar.gz.sha256"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            sympozium-*.tar.gz
            sympozium-*.sha256

  release-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - agent-runner
          - controller
          - apiserver
          - ipc-bridge
          - webhook
          - channel-telegram
          - channel-whatsapp
          - channel-discord
          - channel-slack
          - skill-k8s-ops
          - skill-sre-observability
          - skill-github-gitops
          - skill-llmfit
          - skill-memory
          - mcp-bridge
          - web-proxy
          - node-probe
          - llmfit-daemon
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: tags
        run: |
          TAG="${RELEASE_TAG}"
          VERSION="${TAG#v}"
          MAJOR_MINOR="${VERSION%.*}"
          IMAGE="${{ env.REGISTRY }}/${{ matrix.image }}"
          TAGS="${IMAGE}:${TAG},${IMAGE}:${VERSION},${IMAGE}:${MAJOR_MINOR},${IMAGE}:latest"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/${{ matrix.image }}/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            IMAGE_TAG=${{ env.RELEASE_TAG }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  # ── Sync Helm chart with release ──────────────────────────────────────────────
  release-helm-chart:
    name: Sync Helm chart
    needs: [release-images]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync CRDs to Helm charts
        run: |
          echo "Syncing CRDs to charts/sympozium/crds/..."
          mkdir -p charts/sympozium/crds
          cp config/crd/bases/*.yaml charts/sympozium/crds/
          echo "Syncing CRDs to charts/sympozium-crds/templates/..."
          mkdir -p charts/sympozium-crds/templates
          rm -f charts/sympozium-crds/templates/sympozium.ai_*.yaml
          cp config/crd/bases/*.yaml charts/sympozium-crds/templates/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/
          git diff --cached --quiet && echo "No chart changes" && exit 0
          git commit -m "chore: sync Helm chart CRDs for ${RELEASE_TAG}"
          git push origin main

  # ── Publish Helm chart to GitHub Release ─────────────────────────────────────
  publish-helm-chart:
    name: Publish Helm chart package
    needs: release-helm-chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package charts
        run: |
          # Bundled llmfit-dra dependency (Chart.lock) — resolve before packaging.
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          helm dependency build charts/sympozium
          helm package charts/sympozium-crds --destination .helm-packages
          helm package charts/sympozium      --destination .helm-packages

      - name: Upload charts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            .helm-packages/sympozium-*.tgz
            .helm-packages/sympozium-crds-*.tgz

      - name: Trigger docs rebuild
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run docs.yml

  # ── Update Homebrew tap (disabled — upstream-only) ───────────────────────────
  update-homebrew:
    name: Update Homebrew tap
    needs: release-cli
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: sympozium-ai/homebrew-sympozium
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Download release assets and update formula
        env:
          TAG: ${{ env.RELEASE_TAG }}
        run: |
          VERSION="${TAG#v}"

          declare -A SHAS
          for platform in darwin-amd64 darwin-arm64 linux-amd64 linux-arm64; do
            URL="https://github.com/sympozium-ai/sympozium/releases/download/${TAG}/sympozium-${platform}.tar.gz"
            echo "Hashing ${URL}..."
            SHA=$(curl -fsSL "${URL}" | shasum -a 256 | awk '{print $1}')
            SHAS[$platform]="${SHA}"
            echo "  ${platform}: ${SHA}"
          done

          mkdir -p homebrew-tap/Formula

          cat > homebrew-tap/Formula/sympozium.rb << RUBY
          class Sympozium < Formula
            desc "Kubernetes-native AI agent orchestration platform CLI"
            homepage "https://github.com/sympozium-ai/sympozium"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/sympozium-ai/sympozium/releases/download/v#{version}/sympozium-darwin-arm64.tar.gz"
                sha256 "${SHAS[darwin-arm64]}"
              else
                url "https://github.com/sympozium-ai/sympozium/releases/download/v#{version}/sympozium-darwin-amd64.tar.gz"
                sha256 "${SHAS[darwin-amd64]}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/sympozium-ai/sympozium/releases/download/v#{version}/sympozium-linux-arm64.tar.gz"
                sha256 "${SHAS[linux-arm64]}"
              else
                url "https://github.com/sympozium-ai/sympozium/releases/download/v#{version}/sympozium-linux-amd64.tar.gz"
                sha256 "${SHAS[linux-amd64]}"
              end
            end

            def install
              bin.install "sympozium"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/sympozium version")
            end
          end
          RUBY

          # Fix heredoc indentation
          sed -i 's/^          //' homebrew-tap/Formula/sympozium.rb

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/sympozium.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update sympozium to ${RELEASE_TAG}"
          git push origin HEAD:main
