---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: ensembles.sympozium.ai
spec:
  group: sympozium.ai
  names:
    kind: Ensemble
    listKind: EnsembleList
    plural: ensembles
    singular: ensemble
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.enabled
      name: Enabled
      type: boolean
    - jsonPath: .status.personaCount
      name: Personas
      type: integer
    - jsonPath: .status.installedCount
      name: Installed
      type: integer
    - jsonPath: .spec.workflowType
      name: Workflow
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Ensemble is the Schema for the ensembles API.
          It bundles pre-configured agent personas that can be installed to stamp out
          Agents, Schedules, and memory seeds.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              EnsembleSpec defines a bundle of pre-configured agent personas.
              Installing an Ensemble stamps out Agents, SympoziumSchedules,
              and optionally seeds memory for each persona.
            properties:
              agentConfigs:
                description: Personas is the list of agent personas in this ensemble.
                items:
                  description: AgentConfigSpec defines a single agent configuration
                    within an Ensemble.
                  properties:
                    baseURL:
                      description: BaseURL overrides the ensemble-level base URL for
                        this agent configuration.
                      type: string
                    channelAccessControl:
                      additionalProperties:
                        description: ChannelAccessControl restricts which users and
                          chats can interact via a channel.
                        properties:
                          allowedChats:
                            description: |-
                              AllowedChats restricts interaction to these chat/group IDs.
                              When non-empty, only messages from listed chats are accepted.
                            items:
                              type: string
                            type: array
                          allowedSenders:
                            description: |-
                              AllowedSenders restricts interaction to these sender IDs.
                              When non-empty, only listed senders can trigger agent runs.
                            items:
                              type: string
                            type: array
                          deniedSenders:
                            description: |-
                              DeniedSenders blocks these sender IDs from interacting.
                              Overrides AllowedSenders when a sender appears in both lists.
                            items:
                              type: string
                            type: array
                          denyMessage:
                            description: |-
                              DenyMessage is the text sent back to rejected senders.
                              When empty, rejected messages are silently dropped.
                            type: string
                        type: object
                      description: |-
                        ChannelAccessControl maps channel types to per-agent-configuration access control
                        overrides. When set, these take priority over ensemble-level
                        ChannelAccessControl for this agent configuration. Use AllowedChats with Discord
                        channel IDs to route specific Discord channels to this persona.
                      type: object
                    channelTriggers:
                      additionalProperties:
                        description: |-
                          ChannelTriggerSpec controls when an inbound channel message becomes
                          an AgentRun. All fields are optional; when omitted the agent triggers
                          on every accepted message.
                        properties:
                          startKeywords:
                            description: |-
                              StartKeywords resume a previously-muted agent in a chat (case-
                              insensitive substring). Only evaluated while the chat is muted;
                              otherwise ignored. The triggering message itself is consumed by
                              the resume action and does not produce an AgentRun.
                            items:
                              type: string
                            type: array
                          stopKeywords:
                            description: |-
                              StopKeywords mute the agent in a chat when matched on an inbound
                              message text (case-insensitive substring). Once muted, subsequent
                              messages in that chat are dropped until a StartKeywords match
                              resumes the agent. Has no effect on chats that are already muted.
                            items:
                              type: string
                            type: array
                        type: object
                      description: |-
                        ChannelTriggers maps channel types to per-agent-configuration trigger
                        overrides (start/stop keywords). When set, these take priority over
                        ensemble-level ChannelTriggers for this agent configuration.
                      type: object
                    channels:
                      description: |-
                        Channels lists channel types this agent config should be bound to after install.
                        Users can modify channel bindings later via the TUI edit modal.
                      items:
                        type: string
                      type: array
                    displayName:
                      description: DisplayName is the human-readable name shown in
                        the TUI.
                      type: string
                    env:
                      additionalProperties:
                        type: string
                      description: |-
                        Env defines additional environment variables injected into the
                        agent-runner container of every AgentRun created for this agent
                        configuration. Propagated to the generated Agent's
                        AgentConfig.Env, which the controllers then copy onto each
                        AgentRunSpec.Env.
                      type: object
                    lifecycle:
                      description: |-
                        Lifecycle defines pre and post run hooks for this agent configuration.
                        Propagated to the generated Agent's AgentConfig.
                      properties:
                        gateDefault:
                          default: block
                          description: |-
                            GateDefault controls what happens when a gate hook fails or times out.
                            "allow" passes the original result through unchanged; "block" replaces
                            it with a policy error message. Defaults to "block".
                          enum:
                          - allow
                          - block
                          type: string
                        postRun:
                          description: |-
                            PostRun containers execute in a follow-up Job after the agent completes.
                            They have access to /workspace (with agent output) and receive
                            AGENT_EXIT_CODE and AGENT_RESULT as additional env vars.
                            PostRun failures are recorded as Conditions but do not change the
                            agent's final phase (best-effort semantics).
                          items:
                            description: LifecycleHookContainer defines a container
                              to run as a lifecycle hook.
                            properties:
                              args:
                                description: Args are arguments to the entrypoint.
                                items:
                                  type: string
                                type: array
                              command:
                                description: Command overrides the container entrypoint.
                                items:
                                  type: string
                                type: array
                              env:
                                description: |-
                                  Env is a list of environment variables for this hook container.
                                  Each entry may carry a literal value or source it from a Secret key via
                                  valueFrom.secretKeyRef, allowing hooks to authenticate to private
                                  sources (e.g. a GitHub PAT) without embedding plaintext credentials.
                                items:
                                  description: |-
                                    EnvVar is a simplified environment variable. The value is either supplied
                                    literally via Value or sourced from a Secret via ValueFrom. The two are
                                    mutually exclusive.
                                  properties:
                                    name:
                                      type: string
                                    value:
                                      description: Value is a literal environment
                                        variable value.
                                      type: string
                                    valueFrom:
                                      description: |-
                                        ValueFrom sources the value from outside the spec, e.g. a Secret key.
                                        When set, Value must be empty.
                                      properties:
                                        secretKeyRef:
                                          description: SecretKeyRef selects a single
                                            key of a Secret in the AgentRun namespace.
                                          properties:
                                            key:
                                              description: Key is the key within the
                                                Secret's data to expose.
                                              type: string
                                            name:
                                              description: Name is the name of the
                                                Secret in the AgentRun namespace.
                                              type: string
                                            optional:
                                              description: |-
                                                Optional, when true, allows the Secret or key to be absent without
                                                failing pod startup.
                                              type: boolean
                                          required:
                                          - key
                                          - name
                                          type: object
                                      type: object
                                  required:
                                  - name
                                  type: object
                                type: array
                              gate:
                                description: |-
                                  Gate makes this hook a response gate. When true, agent output is held
                                  until this hook approves, rejects, or rewrites it by patching the
                                  annotation sympozium.ai/gate-verdict on the AgentRun CR.
                                  Only valid on PostRun hooks. At most one PostRun hook may set gate: true.
                                type: boolean
                              image:
                                description: Image is the container image.
                                type: string
                              imagePullPolicy:
                                description: |-
                                  ImagePullPolicy overrides the container image pull policy. Valid values are
                                  "Always", "IfNotPresent", or "Never". Defaults to "IfNotPresent" when unset.
                                enum:
                                - Always
                                - IfNotPresent
                                - Never
                                type: string
                              name:
                                description: Name is the container name.
                                type: string
                              timeout:
                                description: |-
                                  Timeout is the maximum duration for this hook container.
                                  Defaults to 5 minutes.
                                type: string
                            required:
                            - image
                            - name
                            type: object
                          type: array
                        preRun:
                          description: |-
                            PreRun containers execute as init containers before the agent starts.
                            They have access to /workspace, /ipc, /tmp and standard env vars.
                          items:
                            description: LifecycleHookContainer defines a container
                              to run as a lifecycle hook.
                            properties:
                              args:
                                description: Args are arguments to the entrypoint.
                                items:
                                  type: string
                                type: array
                              command:
                                description: Command overrides the container entrypoint.
                                items:
                                  type: string
                                type: array
                              env:
                                description: |-
                                  Env is a list of environment variables for this hook container.
                                  Each entry may carry a literal value or source it from a Secret key via
                                  valueFrom.secretKeyRef, allowing hooks to authenticate to private
                                  sources (e.g. a GitHub PAT) without embedding plaintext credentials.
                                items:
                                  description: |-
                                    EnvVar is a simplified environment variable. The value is either supplied
                                    literally via Value or sourced from a Secret via ValueFrom. The two are
                                    mutually exclusive.
                                  properties:
                                    name:
                                      type: string
                                    value:
                                      description: Value is a literal environment
                                        variable value.
                                      type: string
                                    valueFrom:
                                      description: |-
                                        ValueFrom sources the value from outside the spec, e.g. a Secret key.
                                        When set, Value must be empty.
                                      properties:
                                        secretKeyRef:
                                          description: SecretKeyRef selects a single
                                            key of a Secret in the AgentRun namespace.
                                          properties:
                                            key:
                                              description: Key is the key within the
                                                Secret's data to expose.
                                              type: string
                                            name:
                                              description: Name is the name of the
                                                Secret in the AgentRun namespace.
                                              type: string
                                            optional:
                                              description: |-
                                                Optional, when true, allows the Secret or key to be absent without
                                                failing pod startup.
                                              type: boolean
                                          required:
                                          - key
                                          - name
                                          type: object
                                      type: object
                                  required:
                                  - name
                                  type: object
                                type: array
                              gate:
                                description: |-
                                  Gate makes this hook a response gate. When true, agent output is held
                                  until this hook approves, rejects, or rewrites it by patching the
                                  annotation sympozium.ai/gate-verdict on the AgentRun CR.
                                  Only valid on PostRun hooks. At most one PostRun hook may set gate: true.
                                type: boolean
                              image:
                                description: Image is the container image.
                                type: string
                              imagePullPolicy:
                                description: |-
                                  ImagePullPolicy overrides the container image pull policy. Valid values are
                                  "Always", "IfNotPresent", or "Never". Defaults to "IfNotPresent" when unset.
                                enum:
                                - Always
                                - IfNotPresent
                                - Never
                                type: string
                              name:
                                description: Name is the container name.
                                type: string
                              timeout:
                                description: |-
                                  Timeout is the maximum duration for this hook container.
                                  Defaults to 5 minutes.
                                type: string
                            required:
                            - image
                            - name
                            type: object
                          type: array
                        rbac:
                          description: |-
                            RBAC defines namespace-scoped Kubernetes RBAC rules to create for
                            lifecycle hook containers. A Role and RoleBinding are provisioned
                            in the agent namespace, bound to the "sympozium-agent" ServiceAccount.
                            This allows hooks to interact with Kubernetes resources (e.g., create
                            or delete ConfigMaps, read Secrets).
                          items:
                            description: RBACRule defines a single Kubernetes RBAC
                              policy rule.
                            properties:
                              apiGroups:
                                description: APIGroups is the list of API groups (e.g.
                                  "", "apps", "batch").
                                items:
                                  type: string
                                type: array
                              resources:
                                description: Resources is the list of resources (e.g.
                                  "pods", "deployments").
                                items:
                                  type: string
                                type: array
                              verbs:
                                description: Verbs is the list of allowed verbs (e.g.
                                  "get", "list", "watch").
                                items:
                                  type: string
                                type: array
                            required:
                            - apiGroups
                            - resources
                            - verbs
                            type: object
                          type: array
                      type: object
                    mcpServers:
                      description: |-
                        MCPServers configures remote MCP (Model Context Protocol) servers
                        for this agent configuration. Each entry references an MCPServer CR
                        by Name (or supplies an inline URL) and is mounted into the generated
                        Agent's spec.mcpServers list, which the agent-runner consumes via the
                        mcp-bridge sidecar.
                      items:
                        description: MCPServerRef references a remote MCP server for
                          tool integration.
                        properties:
                          authKey:
                            description: AuthKey is the key within AuthSecret to use.
                              Defaults to "token".
                            type: string
                          authSecret:
                            description: |-
                              AuthSecret references a Kubernetes Secret containing auth credentials.
                              The key specified by AuthKey (default "token") is used as a Bearer token.
                            type: string
                          headers:
                            additionalProperties:
                              type: string
                            description: Headers are additional HTTP headers to send
                              with every request.
                            type: object
                          name:
                            description: Name is a unique identifier for this MCP
                              server connection.
                            minLength: 1
                            type: string
                          timeout:
                            default: 30
                            description: Timeout is the per-request timeout in seconds
                              for this server.
                            type: integer
                          toolsAllow:
                            description: ToolsAllow lists tool names (without prefix)
                              to expose. If set, only these tools are registered.
                            items:
                              type: string
                            type: array
                          toolsDeny:
                            description: ToolsDeny lists tool names (without prefix)
                              to hide. Applied after toolsAllow.
                            items:
                              type: string
                            type: array
                          toolsPrefix:
                            description: |-
                              ToolsPrefix is prepended to tool names from this server to avoid collisions.
                              Must be unique across all configured servers.
                            minLength: 1
                            type: string
                          url:
                            description: URL is the MCP server's Streamable HTTP endpoint.
                              Optional if an MCPServer CR with this name exists.
                            type: string
                        required:
                        - name
                        - toolsPrefix
                        type: object
                      type: array
                    memory:
                      description: Memory defines initial memory seeds for this agent
                        configuration.
                      properties:
                        enabled:
                          default: true
                          description: Enabled indicates whether persistent memory
                            is active.
                          type: boolean
                        seeds:
                          description: Seeds is a list of initial memory entries injected
                            into MEMORY.md.
                          items:
                            type: string
                          type: array
                      required:
                      - enabled
                      type: object
                    model:
                      description: |-
                        Model overrides the default model for this agent configuration.
                        If empty, the ensemble-level or onboarding-time model is used.
                      type: string
                    name:
                      description: Name is the agent configuration identifier (used
                        as suffix in generated instance names).
                      type: string
                    provider:
                      description: |-
                        Provider overrides the ensemble-level provider for this agent configuration.
                        When set, the controller uses this persona's own provider
                        instead of the ensemble-level AuthRefs/BaseURL.
                      type: string
                    providerHeaders:
                      additionalProperties:
                        type: string
                      description: |-
                        ProviderHeaders overrides ensemble-level provider headers for this agent configuration.
                        Keys here take precedence over ensemble-level ProviderHeaders.
                      type: object
                    providerHeadersSecretRef:
                      description: |-
                        ProviderHeadersSecretRef overrides the ensemble-level provider headers secret
                        for this agent configuration. When set, replaces (not merges with) the
                        ensemble-level ProviderHeadersSecretRef.
                      type: string
                    runTimeout:
                      description: |-
                        RunTimeout is the maximum duration for each agent run created for this
                        agent configuration (e.g. "30m", "1h"). Propagated to the generated
                        Agent's AgentConfig.RunTimeout, which the controllers then persist onto
                        each AgentRunSpec.Timeout. A persisted timeout drives all controller-side
                        gates consistently (watchdog, Job activeDeadlineSeconds, and the
                        RUN_TIMEOUT env), so scheduled/sweep runs can exceed the 10m default.
                        When empty, the provider-appropriate default applies.
                      type: string
                    schedule:
                      description: Schedule defines a recurring task for this agent
                        configuration.
                      properties:
                        cron:
                          description: Cron is a raw cron expression. Takes precedence
                            over Interval.
                          type: string
                        firstTick:
                          default: immediate
                          description: |-
                            FirstTick controls whether a newly created schedule runs straight away.
                            "immediate" (default): the first tick is treated as already due, so the
                            agent runs as soon as the ensemble is enabled.
                            "afterInterval": wait a full interval before the first run. Use this when
                            the agent has nothing to do until something else has happened — a
                            heartbeat that fires at t=0 wakes up to an empty inbox, and when a
                            stimulus targets the same agent the two collide and do the work twice.
                          enum:
                          - immediate
                          - afterInterval
                          type: string
                        interval:
                          description: |-
                            Interval is a human-readable interval (e.g. "30m", "1h", "6h").
                            Converted to a cron expression by the controller.
                          type: string
                        task:
                          description: Task is the task description sent to the agent
                            on each trigger.
                          type: string
                        type:
                          default: heartbeat
                          description: 'Type categorises the schedule: heartbeat,
                            scheduled, or sweep.'
                          enum:
                          - heartbeat
                          - scheduled
                          - sweep
                          type: string
                      required:
                      - task
                      - type
                      type: object
                    skills:
                      description: Skills lists SkillPack references to mount into
                        the agent pod.
                      items:
                        type: string
                      type: array
                    slackOptions:
                      description: |-
                        SlackOptions overrides ensemble-level Slack-specific channel
                        settings (threading, allowed-triggers, sticky threads) for this
                        agent configuration. When non-nil, replaces the ensemble-level
                        SlackOptions entirely (no field-level merge).
                      properties:
                        allowedTriggers:
                          description: |-
                            AllowedTriggers gates which inbound message kinds may start an
                            AgentRun. Values: "mention" (the bot is @-mentioned),
                            "dm" (direct message to the bot), "channel" (any other channel
                            or group message). When empty, all kinds trigger the agent.
                            Composes (AND) with ChannelAccessControl.
                          items:
                            type: string
                          type: array
                        emojiOnStart:
                          description: |-
                            EmojiOnStart is the reaction added when a start keyword
                            resumes the chat. Default: "loud_sound".
                          type: string
                        emojiOnStop:
                          description: |-
                            EmojiOnStop is the reaction added when a stop keyword mutes
                            the chat. Default: "mute".
                          type: string
                        emojiOnTrigger:
                          description: |-
                            EmojiOnTrigger is the reaction added to inbound messages that
                            successfully start an AgentRun. Default: "eyes".
                          type: string
                        threadStickiness:
                          description: |-
                            ThreadStickiness, when true together with Threading, lets the
                            user who originally opened a thread keep talking to the bot
                            without re-mentioning. The first sender to address the bot in
                            a thread becomes the thread's "owner". Any message from anyone
                            other than the owner — even an @-mention from a denied user —
                            permanently marks the thread "interrupted". Once interrupted,
                            every subsequent message (including from the owner) must
                            satisfy AllowedTriggers (e.g. @-mention) to be processed; the
                            lax free-flow mode never resumes for that thread. Has no
                            effect when Threading is false.
                          type: boolean
                        threading:
                          description: |-
                            Threading controls reply placement. When true, replies are sent
                            in a thread: messages already inside a thread reply in that
                            thread, and top-level messages get a new thread anchored to the
                            inbound message. When false (default) replies are posted at the
                            top level of the channel.
                          type: boolean
                      type: object
                    subagents:
                      description: |-
                        Subagents configures ad-hoc sub-agent spawning limits for this persona.
                        When set, the generated Agent's SubagentsSpec is populated and the
                        spawn_subagents tool becomes available (requires the "subagents" SkillPack).
                      properties:
                        maxChildrenPerAgent:
                          default: 3
                          description: MaxChildrenPerAgent is the maximum number of
                            children per agent.
                          type: integer
                        maxConcurrent:
                          default: 5
                          description: MaxConcurrent is the maximum number of concurrent
                            agent runs.
                          type: integer
                        maxDepth:
                          default: 2
                          description: MaxDepth is the maximum nesting depth for sub-agents.
                          type: integer
                      type: object
                    systemPrompt:
                      description: SystemPrompt is the system prompt that defines
                        the agent's role and behaviour.
                      type: string
                    toolPolicy:
                      description: ToolPolicy defines which tools this agent config
                        is allowed to use.
                      properties:
                        allow:
                          description: Allow lists explicitly allowed tools.
                          items:
                            type: string
                          type: array
                        deny:
                          description: Deny lists explicitly denied tools.
                          items:
                            type: string
                          type: array
                      type: object
                    webEndpoint:
                      description: WebEndpoint configures the web endpoint for this
                        agent configuration.
                      properties:
                        enabled:
                          description: Enabled indicates whether the web endpoint
                            is active.
                          type: boolean
                        hostname:
                          description: Hostname overrides the auto-derived hostname.
                          type: string
                      required:
                      - enabled
                      type: object
                  required:
                  - name
                  - systemPrompt
                  type: object
                type: array
              agentSandbox:
                description: |-
                  AgentSandbox configures the Kubernetes Agent Sandbox (CRD) execution backend
                  for all instances generated by this ensemble. When enabled, agent runs use Sandbox
                  CRs with gVisor/Kata kernel-level isolation.
                properties:
                  enabled:
                    description: Enabled activates Agent Sandbox mode for all runs
                      in this instance.
                    type: boolean
                  runtimeClass:
                    description: RuntimeClass is the default runtimeClassName (e.g.,
                      "gvisor", "kata").
                    type: string
                  warmPool:
                    description: WarmPool configures a controller-managed SandboxWarmPool
                      for this instance.
                    properties:
                      resources:
                        description: Resources for each warm pool sandbox.
                        properties:
                          limits:
                            additionalProperties:
                              type: string
                            type: object
                          requests:
                            additionalProperties:
                              type: string
                            type: object
                        type: object
                      runtimeClass:
                        description: RuntimeClass for warm pool sandboxes.
                        type: string
                      size:
                        default: 2
                        description: Size is the number of pre-warmed sandboxes to
                          maintain.
                        type: integer
                    type: object
                required:
                - enabled
                type: object
              authRefs:
                description: |-
                  AuthRefs references secrets containing AI provider credentials.
                  Applied to all generated Agents. Set during install.
                items:
                  description: SecretRef references a Kubernetes Secret.
                  properties:
                    provider:
                      description: Provider is the AI provider name (e.g. "openai",
                        "anthropic", "azure-openai", "ollama").
                      type: string
                    secret:
                      description: Secret is the name of the Secret.
                      type: string
                  required:
                  - secret
                  type: object
                type: array
              baseURL:
                description: |-
                  BaseURL overrides the provider's default API endpoint for all generated instances.
                  Set during onboarding for local providers (e.g. Ollama, LM Studio) that do not
                  require authentication.
                type: string
              category:
                description: Category classifies this ensemble (e.g. "platform", "security",
                  "devops").
                type: string
              channelAccessControl:
                additionalProperties:
                  description: ChannelAccessControl restricts which users and chats
                    can interact via a channel.
                  properties:
                    allowedChats:
                      description: |-
                        AllowedChats restricts interaction to these chat/group IDs.
                        When non-empty, only messages from listed chats are accepted.
                      items:
                        type: string
                      type: array
                    allowedSenders:
                      description: |-
                        AllowedSenders restricts interaction to these sender IDs.
                        When non-empty, only listed senders can trigger agent runs.
                      items:
                        type: string
                      type: array
                    deniedSenders:
                      description: |-
                        DeniedSenders blocks these sender IDs from interacting.
                        Overrides AllowedSenders when a sender appears in both lists.
                      items:
                        type: string
                      type: array
                    denyMessage:
                      description: |-
                        DenyMessage is the text sent back to rejected senders.
                        When empty, rejected messages are silently dropped.
                      type: string
                  type: object
                description: |-
                  ChannelAccessControl maps channel types to their access control rules.
                  Propagated to generated instances during reconciliation.
                type: object
              channelConfigs:
                additionalProperties:
                  type: string
                description: |-
                  ChannelConfigs maps channel types to their credential secret names.
                  Populated during agent config onboarding when users provide channel tokens.
                  The controller uses this to set ConfigRef on generated instances.
                type: object
              channelTriggers:
                additionalProperties:
                  description: |-
                    ChannelTriggerSpec controls when an inbound channel message becomes
                    an AgentRun. All fields are optional; when omitted the agent triggers
                    on every accepted message.
                  properties:
                    startKeywords:
                      description: |-
                        StartKeywords resume a previously-muted agent in a chat (case-
                        insensitive substring). Only evaluated while the chat is muted;
                        otherwise ignored. The triggering message itself is consumed by
                        the resume action and does not produce an AgentRun.
                      items:
                        type: string
                      type: array
